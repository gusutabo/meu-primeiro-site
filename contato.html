<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade - Front-End: Contato</title>
</head>
<body>
    <a href="index.html"><~ Volte para a homepage.</a><br><br>
    <img src="img/milou.jpg" alt="Milou">
    <h1>Entre em contato comigo. :)</h1>
    <br>
    <form action="contato" method="post"> 
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" required>
        <br>
        <label for="email">Email:</label>
        <input type="text" id="email" name="email" required>
        <br>
        <label for="Senha">Telefone:</label>
        <input type="text" id="telefone" name="telefone" required>
        <br><br>
        <label for="message">Mensagem: </label><br>
        <textarea name="message" id="message" rows="4" cols="50" required></textarea><br>
        <br>
        <label for="aceitar_termos">Aceitar termos: </label>
        <input type="checkbox" name="Aceitar termos" id="aceitar_termos">
        <br><br><br>
        <button type="submit" value="Enviar">Enviar</button>
    </form>  
</body>
</html>
